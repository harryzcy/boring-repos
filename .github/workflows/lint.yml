name: Lint

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@a0dee436184d6eeacdc042b8487c78eb3186e1cd # main
  
  npm-lint:
    uses: harryzcy/github-actions/.github/workflows/npm-lint.yml@a0dee436184d6eeacdc042b8487c78eb3186e1cd # main

  prettier:
    uses: harryzcy/github-actions/.github/workflows/prettier.yml@a0dee436184d6eeacdc042b8487c78eb3186e1cd # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@a0dee436184d6eeacdc042b8487c78eb3186e1cd # main

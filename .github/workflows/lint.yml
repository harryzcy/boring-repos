name: Lint

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@75a4223ef28b3e101d76183d73c7f0ba3f5d6959 # main
  
  npm-lint:
    uses: harryzcy/github-actions/.github/workflows/npm-lint.yml@75a4223ef28b3e101d76183d73c7f0ba3f5d6959 # main

  prettier:
    uses: harryzcy/github-actions/.github/workflows/prettier.yml@75a4223ef28b3e101d76183d73c7f0ba3f5d6959 # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@75a4223ef28b3e101d76183d73c7f0ba3f5d6959 # main

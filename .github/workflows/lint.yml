name: Lint

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@5c350fb8e7d4e34d805326462b198a7d8891358c # main
  
  npm-lint:
    uses: harryzcy/github-actions/.github/workflows/npm-lint.yml@5c350fb8e7d4e34d805326462b198a7d8891358c # main

  prettier:
    uses: harryzcy/github-actions/.github/workflows/prettier.yml@5c350fb8e7d4e34d805326462b198a7d8891358c # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@5c350fb8e7d4e34d805326462b198a7d8891358c # main

name: Lint

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    uses: harryzcy/github-actions/.github/workflows/linter.yml@93e63bd27d176cac11d24d609c8b7fdab38f32ba # main

  prettier:
    uses: harryzcy/github-actions/.github/workflows/prettier.yml@93e63bd27d176cac11d24d609c8b7fdab38f32ba # main

  spelling:
    uses: harryzcy/github-actions/.github/workflows/spelling.yml@93e63bd27d176cac11d24d609c8b7fdab38f32ba # main
